<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#072C49">
    <title>Instructor Profile | Free ICT Course | SITC</title>

    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Open+Sans:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-blue: #072C49;
            --accent-red: #BB1A3E;
    
    /* Additional styles can go here */
    
            --text-dark: #32373c;
            --bg-light: #f4f5f7;
            --white: #ffffff;
            --font-headings: 'Open Sans', sans-serif;
            --font-body: 'Lato', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            color: var(--text-dark);
            background-color: var(--bg-light);
            line-height: 1.6;
        }

        header {
            background-color: var(--white);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            padding: 15px 5%;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: var(--font-headings);
            font-size: 24px;
            font-weight: 800;
            color: var(--primary-blue);
            text-decoration: none;
        }

        .container {
            max-width: 1100px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--accent-red);
            text-decoration: none;
            font-weight: 700;
            font-family: var(--font-headings);
        }

        .instructor-profile {
            background: var(--white);
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            padding: 28px;
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 28px;
            margin-bottom: 24px;
        }

        .instructor-photo-wrap {
            width: 100%;
            max-width: 260px;
            aspect-ratio: 1 / 1;
        }

        .instructor-photo,
        .instructor-photo-fallback {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 10px 20px rgba(7, 44, 73, 0.18);
        }

        .instructor-photo-fallback {
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #0f4e7a, #072c49);
            color: #fff;
            font-size: 4rem;
            font-weight: 800;
            font-family: var(--font-headings);
        }

        .instructor-kicker {
            color: var(--accent-red);
            font-weight: 700;
            margin-bottom: 6px;
        }

        .instructor-content h1 {
            font-family: var(--font-headings);
            color: var(--primary-blue);
            font-size: 2rem;
            margin-bottom: 6px;
        }

        .instructor-role {
            font-weight: 700;
            margin-bottom: 10px;
        }

        .instructor-tagline {
            color: #555;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .instructor-bio,
        .instructor-exp {
            margin-bottom: 12px;
        }

        .instructor-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .btn {
            display: inline-block;
            background-color: var(--accent-red);
            color: var(--white);
            padding: 10px 18px;
            font-family: var(--font-headings);
            font-weight: 700;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.25s ease;
        }

        .btn:hover { background-color: #981530; }

        .btn-outline {
            background-color: transparent;
            color: var(--primary-blue);
            border: 2px solid var(--primary-blue);
        }

        .btn-outline:hover {
            background-color: var(--primary-blue);
            color: var(--white);
        }

        .instructor-panels {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .instructor-panel {
            background: var(--white);
            border-radius: 14px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.07);
            padding: 20px;
        }

        .instructor-panel h3 {
            color: var(--primary-blue);
            margin-bottom: 10px;
            font-family: var(--font-headings);
        }

        .instructor-panel ul {
            padding-left: 28px;
        }

        .instructor-panel li {
            margin-bottom: 8px;
        }

        footer {
            background-color: var(--primary-blue);
            color: var(--white);
            text-align: center;
            padding: 20px;
            margin-top: 60px;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .instructor-profile {
                grid-template-columns: 1fr;
            }

            .instructor-photo-wrap {
                max-width: 220px;
                margin: 0 auto;
            }
        }
    </style>
    <script src="assets/js/render-instructor.js" defer></script>
</head>
<body>
    <header>
        <a href="index.html" class="logo">SITC | Free ICT Course</a>
    </header>

    <div class="container">
        <a href="index.html" class="back-link">&larr; Back to Course Home</a>
        <div data-instructor-full></div>
    </div>

    <footer>
        <p>&copy; 2026 SITC Campus | Free ICT Course Instructed by Ravindu Sooriyaarachchi</p>
    </footer>
</body>
</html>
